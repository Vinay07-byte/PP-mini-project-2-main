<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoSense - Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body { margin: 0; padding: 0; font-family: 'Open Sans', sans-serif; }
    .landing-hero {
      min-height: 100vh;
      background: linear-gradient(rgba(46,125,50,0.9), rgba(76,175,80,0.9)), 
                  url('https://images.unsplash.com/photo-1416879595882-3373a0480b5b?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80') center/cover;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      padding: 2rem;
    }
    .logo {
      font-size: 4rem;
      font-weight: bold;
      margin-bottom: 1rem;
    }
    .landing-hero h1 {
      font-size: 3.5rem;
      margin: 0 0 1rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    .landing-hero p {
      font-size: 1.5rem;
      margin-bottom: 3rem;
      max-width: 600px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }
    .auth-buttons {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .cta-btn {
      padding: 1.2rem 3rem;
      font-size: 1.2rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }
    .login-btn {
      background: var(--primary-green, #4CAF50);
      color: white;
    }
    .signup-btn {
      background: transparent;
      color: white;
      border: 2px solid white;
    }
    .cta-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    @media (max-width: 768px) {
      .landing-hero h1 { font-size: 2.5rem; }
      .landing-hero p { font-size: 1.2rem; }
      .auth-buttons { flex-direction: column; align-items: center; }
      .cta-btn { min-width: 250px; }
    }
  </style>
</head>
<body>
  <section class="landing-hero">
    <div class="logo">
      <i class="fas fa-leaf"></i>
      EcoSense
    </div>
    <h1>Smart Sustainability Starts Here</h1>
    <p>Join thousands making a difference. Scan waste, calculate footprints, find recycling - all in one place.</p>
    <div class="auth-buttons">
      <a href="login.html" class="cta-btn login-btn">
        <i class="fas fa-sign-in-alt"></i> Login
      </a>
      <a href="login.html#signup" class="cta-btn signup-btn" onclick="document.getElementById('signUpForm').scrollIntoView(); return false;">
        <i class="fas fa-user-plus"></i> Sign Up
      </a>
    </div>
    <p style="margin-top: 3rem; font-size: 1rem; opacity: 0.9;">Already have account? <a href="index.html" style="color: #fff; text-decoration: underline;">Enter App</a></p>
  </section>
</body>
</html>
