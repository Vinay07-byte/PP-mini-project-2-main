<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EcoSense</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  
  <!-- Supabase scripts - SINGLE LOAD ONLY -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script src="database.js"></script>
</head>
<body>
  <div class="login-hero">
    <div class="login-container">
      <div class="login-logo">
        <i class="fas fa-leaf"></i>
        EcoSense
      </div>
      <h1>Welcome Back</h1>
      <p>Sign in to your account to continue to the green future</p>

      <!-- Tab Toggle -->
      <div class="tab-toggle">
        <button class="tab-btn active" data-tab="login">Login</button>
        <button class="tab-btn" data-tab="signup">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form active">
        <div class="form-group">
          <label for="email"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="cta-btn full-width">Sign In</button>
        <p id="loginMessage" class="message"></p>
      </form>

      <!-- Sign Up Form - Added Name field -->
      <form id="signUpForm" class="auth-form">
        <div class="form-group">
          <label for="signUpName"><i class="fas fa-user"></i> Full Name</label>
          <input type="text" id="signUpName" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="signUpEmail"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="signUpEmail" required>
        </div>
        <div class="form-group">
          <label for="signUpPassword"><i class="fas fa-lock"></i> Password</label>
          <input type="password" id="signUpPassword" required minlength="6">
        </div>
        <button type="submit" class="cta-btn full-width">Create Account</button>
        <p id="signUpMessage" class="message"></p>
      </form>
    </div>
  </div>

  <script>
    // Wait for Supabase to load before auth
    window.addEventListener('load', () => {
      if (typeof window.supabaseClient === 'undefined') {
        console.error('Supabase client not loaded!');
        alert('Supabase not loaded. Check console.');
        return;
      }

      const loginForm = document.getElementById('loginForm');
      const signUpForm = document.getElementById('signUpForm');
      const tabBtns = document.querySelectorAll('.tab-btn');
      const forms = document.querySelectorAll('.auth-form');
      const loginMessage = document.getElementById('loginMessage');
      const signUpMessage = document.getElementById('signUpMessage');

      // Tab switching
      tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const tab = btn.dataset.tab;
          
          tabBtns.forEach(b => b.classList.remove('active'));
          forms.forEach(f => f.classList.remove('active'));
          btn.classList.add('active');
          
          if (tab === 'login') {
            loginForm.classList.add('active');
          } else {
            signUpForm.classList.add('active');
          }
        });
      });

      // Login
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        loginMessage.textContent = 'Signing in...';
        loginMessage.className = 'message loading';
        
        const result = await signIn(email, password);
        if (result.success) {
          loginMessage.textContent = 'Login successful! Redirecting...';
          loginMessage.className = 'message success';
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1500);
        } else {
          loginMessage.textContent = result.error;
          loginMessage.className = 'message error';
        }
      });

      // Sign Up - Updated to pass name
      signUpForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('signUpName').value;
        const email = document.getElementById('signUpEmail').value;
        const password = document.getElementById('signUpPassword').value;
        
        signUpMessage.textContent = 'Creating account...';
        signUpMessage.className = 'message loading';
        
        const result = await signUp(email, password, name);
        if (result.success) {
          signUpMessage.textContent = 'Account created! Name saved. Check email to verify.';
          signUpMessage.className = 'message success';
          setTimeout(() => {
            // Switch to login tab
            tabBtns[0].click();
          }, 2000);
        } else {
          signUpMessage.textContent = result.error;
          signUpMessage.className = 'message error';
        }
      });
    });
  </script>

  <style>
    .login-hero {
      min-height: 100vh;
      background: linear-gradient(rgba(46,125,50,0.9), rgba(76,175,80,0.9)), 
                  url('https://images.unsplash.com/photo-1416879595882-3373a0480b5b?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-container {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      padding: 3rem;
      border-radius: 20px;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      text-align: center;
    }
    .login-logo {
      font-size: 2.5rem;
      font-weight: bold;
      color: var(--dark-green);
      margin-bottom: 1rem;
    }
    .login-container h1 {
      color: var(--dark-green);
      margin-bottom: 0.5rem;
      font-size: 2rem;
    }
    .login-container p {
      color: var(--text-light);
      margin-bottom: 2rem;
    }
    .tab-toggle {
      display: flex;
      margin-bottom: 2rem;
      background: var(--light-green);
      border-radius: 50px;
      overflow: hidden;
    }
    .tab-btn {
      flex: 1;
      padding: 1rem;
      border: none;
      background: none;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .tab-btn.active {
      background: var(--primary-green);
      color: white;
    }
    .auth-form {
      display: none;
    }
    .auth-form.active {
      display: block;
    }
    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }
    .form-group label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      color: var(--dark-green);
      margin-bottom: 0.5rem;
    }
    .form-group input {
      width: 100%;
      padding: 1rem;
      border: 2px solid var(--light-gray);
      border-radius: 10px;
      font-size: 1rem;
    }
    .form-group input:focus {
      border-color: var(--primary-green);
      outline: none;
    }
    .full-width {
      width: 100%;
      margin-bottom: 1rem;
    }
    .message {
      margin-top: 1rem;
      font-weight: 500;
    }
    .message.success {
      color: var(--primary-green);
    }
    .message.error {
      color: #f44336;
    }
    .message.loading {
      color: var(--dark-green);
    }
    @media (max-width: 480px) {
      .login-container {
        padding: 2rem 1.5rem;
        margin: 1rem;
      }
    }
  </style>
